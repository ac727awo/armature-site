<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" fill="none">
  <!-- Heraldic lion passant rampant — dark green on transparent -->
  <!-- Body -->
  <ellipse cx="210" cy="240" rx="110" ry="65" fill="#1c3828"/>
  <!-- Haunches -->
  <ellipse cx="130" cy="270" rx="55" ry="70" fill="#1c3828"/>
  <!-- Chest -->
  <ellipse cx="290" cy="210" rx="60" ry="75" fill="#1c3828"/>
  <!-- Neck -->
  <ellipse cx="295" cy="155" rx="45" ry="55" fill="#1c3828"/>
  <!-- Head -->
  <ellipse cx="300" cy="105" rx="55" ry="50" fill="#1c3828"/>
  <!-- Mane — large ellipse behind head -->
  <ellipse cx="285" cy="120" rx="72" ry="68" fill="#1c3828"/>
  <!-- Head over mane -->
  <ellipse cx="308" cy="98" rx="48" ry="44" fill="#1c3828"/>
  <!-- Snout -->
  <ellipse cx="350" cy="115" rx="28" ry="20" fill="#1c3828"/>
  <!-- Jaw open -->
  <ellipse cx="352" cy="125" rx="22" ry="14" fill="#1c3828"/>
  <!-- Eye -->
  <ellipse cx="325" cy="88" rx="10" ry="7" fill="#f5f0eb"/>
  <ellipse cx="326" cy="88" rx="5" ry="4" fill="#1c3828"/>
  <!-- Ear -->
  <ellipse cx="300" cy="62" rx="14" ry="18" fill="#1c3828"/>
  <!-- Front raised leg -->
  <rect x="295" y="255" width="38" height="90" rx="19" fill="#1c3828" transform="rotate(-12 295 255)"/>
  <!-- Front paw -->
  <ellipse cx="320" cy="340" rx="24" ry="16" fill="#1c3828"/>
  <!-- Rear leg -->
  <rect x="145" y="300" width="36" height="55" rx="18" fill="#1c3828"/>
  <!-- Rear paw -->
  <ellipse cx="160" cy="348" rx="28" ry="14" fill="#1c3828"/>
  <!-- Second rear leg suggestion -->
  <rect x="185" y="295" width="30" height="50" rx="15" fill="#1c3828"/>
  <!-- Tail — curling upward to right -->
  <path d="M130 240 Q60 200 50 150 Q42 100 90 80 Q130 65 140 95" stroke="#1c3828" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Tail curl tip -->
  <circle cx="148" cy="88" r="22" fill="#1c3828"/>
  <circle cx="155" cy="78" r="14" fill="#1c3828"/>
  <!-- White detail lines (mane grooves) -->
  <path d="M255 130 Q270 145 265 165" stroke="#f5f0eb" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M272 118 Q290 135 282 158" stroke="#f5f0eb" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M245 148 Q252 165 245 182" stroke="#f5f0eb" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Chest groove -->
  <path d="M290 175 Q298 200 290 225" stroke="#f5f0eb" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
