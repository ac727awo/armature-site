<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Shield -->
  <g transform="translate(0, 2)">
    <!-- Shield shape: flat top, angled sides, pointed bottom -->
    <path d="M8 4 L42 4 L42 28 L25 46 L8 28 Z" fill="#c8a84b"/>
    <!-- Lion body (simplified heraldic lion passant) -->
    <!-- Body -->
    <ellipse cx="25" cy="22" rx="8" ry="5" fill="#1c3828"/>
    <!-- Head -->
    <circle cx="33" cy="18" r="4.5" fill="#1c3828"/>
    <!-- Mane suggestion -->
    <circle cx="33" cy="17" r="5.5" fill="#1c3828" opacity="0.5"/>
    <!-- Front leg down -->
    <rect x="31" y="22" width="3" height="7" rx="1.5" fill="#1c3828"/>
    <!-- Back leg -->
    <rect x="17" y="22" width="3" height="6" rx="1.5" fill="#1c3828"/>
    <!-- Tail curl -->
    <path d="M17 20 Q10 14 14 10 Q16 8 18 11" stroke="#1c3828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="54" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="500" letter-spacing="0.5" fill="#1c3828">Armature</text>
  <text x="55" y="44" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" font-weight="500" letter-spacing="3.5" fill="#4a6155">WEALTH OFFICE</text>
</svg>
